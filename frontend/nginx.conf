# ── Upstream with sticky sessions for horizontal scaling ────
# When scaling platform to multiple replicas, ip_hash ensures
# the same client always hits the same backend (sticky sessions).
upstream platform_backend {
    ip_hash;
    server platform:8000;
    # Add more replicas here when scaling:
    # server platform-2:8000;
    # server platform-3:8000;
    keepalive 32;
}

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Request Limits ────────────────────────────────────────────
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Static Assets (long cache) ───────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (so new deploys are picked up)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── API Reverse Proxy ────────────────────────────────────────
    location /api/ {
        proxy_pass http://platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts for AI endpoints (can be slow)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── SSE Streaming ────────────────────────────────────────────
    location /api/v1/chat/ask-stream {
        proxy_pass http://platform_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Block sensitive paths ────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
